<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台灣資服業者方案資料庫</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background-color: #f8fafc; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .animate-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const formatCurrency = (num) => {
      if (num === null || num === undefined || num === "") return "未提供";
      return "NT$ " + Number(num).toLocaleString();
    };

    function App() {
      const [allData, setAllData] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const [activePage, setActivePage] = useState("home");
      const [query, setQuery] = useState("");
      const [expandedId, setExpandedId] = useState(null);
      const [isSearching, setIsSearching] = useState(false);
      const [isCopilotOpen, setIsCopilotOpen] = useState(false);
      
      const [filters, setFilters] = useState({
        region: null,
        isAI: null,
        isStartup: null,
        category: null,
        maxPrice: null,
        domain: null
      });

      const REGIONS = ["北部", "中部", "南部", "東部", "其他"];
      const CATEGORIES = ["企業管理", "商務交易", "行銷客服", "技術基礎", "ESG永續"];

      // ==========================================
      // 1. Airtable API 抓取與資料清洗邏輯
      // ==========================================
      useEffect(() => {
        async function fetchAll() {
          const TOKEN = "patmts6f2hUZLLkOj.3583d8a1d487f9db997e6eac85ce468424697fe2f9577f96428216294d60693c
"; // ⚠️ 請記得替換為您的 Token
          const BASE_ID = "appttP04OnzzC7qxG";
          const TABLE = "Solutions";
          let allRecords = [];
          let offset = null;

          try {
            do {
              let url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE}?pageSize=100`;
              if (offset) url += `&offset=${offset}`;

              const res = await fetch(url, {
                headers: { "Authorization": `Bearer ${TOKEN}` }
              });

              if (!res.ok) throw new Error(`API 錯誤: 狀態碼 ${res.status}`);
              const data = await res.json();

              const converted = data.records.map(rec => {
                const fields = {};
                Object.keys(rec.fields).forEach(k => {
                  fields[k.replace(/^\uFEFF/, '')] = rec.fields[k];
                });

                return {
                  id: rec.id,
                  s: fields["方案名稱"] || "",
                  c: (fields["公司名稱"] || [])[0] || "",
                  p: fields["參與計畫"] || "",
                  ai: fields["是否AI方案"] === "True",
                  d: (fields["服務領域"] || []).join(", "),
                  cat: (fields["領域大分類"] || []).join(", "),
                  pr: fields["費用"] || null,
                  pt: fields["價格區間"] || "",
                  mo: fields["月費"] || null,
                  mt: fields["月費區間"] || "",
                  // 🚀 修正：確保區域值有 trim
                  r: (typeof fields["區域"] === "string" ? fields["區域"].trim() : (fields["區域"] || [])[0] || "").trim(),
                  st: fields["是否新創"] === "True",
                  desc: fields["方案介紹"] || ""
                };
              });

              allRecords = allRecords.concat(converted);
              offset = data.offset || null;
            } while (offset);

            setAllData(allRecords);
            setLoading(false);
          } catch (err) {
            console.error("Airtable Error:", err);
            setError(err.message);
            setLoading(false);
          }
        }
        fetchAll();
      }, []);

      // ==========================================
      // 2. Claude API 語意解析
      // ==========================================
      async function callClaude(userQuery) {
        const CLAUDE_KEY = "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"; // ⚠️ 請記得替換為您的 Claude Key
        const systemPrompt = `你是一個資服方案資料庫的查詢助手。
使用者會用自然語言描述想找的方案，你要把它轉成 JSON 篩選條件。

可用的篩選欄位：
- region: 區域，可選值："北部"/"中部"/"南部"/"東部"/"其他"
- ai: 是否為AI方案，true/false
- startup: 是否為新創，true/false
- category: 領域大分類，可選值："企業管理"/"商務交易"/"行銷客服"/"技術基礎"/"ESG永續"
- domainKey: 服務領域關鍵字，例如 "ERP"/"POS"/"客服"/"資安"/"碳排"/"SEO" 等
- program: 參與計畫，可選值："雲市集"/"新創嚴選"
- maxPrice: 總費用上限（數字）
- maxMonthly: 月費上限（數字）

規則：
1. 只回傳 JSON，不要有任何其他文字
2. 只包含使用者提到的條件，沒提到的不要加
3. 金額要轉成數字，例如"5萬"=50000，"3千"=3000
4. 如果使用者的輸入無法解析成任何條件，回傳空物件 {}`;

        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": CLAUDE_KEY,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify({
            model: "claude-3-5-sonnet-20241022",
            max_tokens: 200,
            messages: [{ role: "user", content: userQuery }],
            system: systemPrompt
          })
        });

        if (!res.ok) {
          const errorData = await res.json();
          throw new Error(`Claude API 錯誤 ${res.status}: ${errorData.error?.message || '未知錯誤'}`);
        }

        const data = await res.json();
        const text = data.content[0].text;
        const clean = text.replace(/```json\n?/g, "").replace(/```/g, "").trim();
        return JSON.parse(clean);
      }

      // ==========================================
      // 3. Fallback: 前端關鍵字比對
      // ==========================================
      const parseQueryFallback = (text) => {
        let newFilters = { region: null, isAI: null, isStartup: null, category: null, maxPrice: null, domain: null };
        const q = text.toLowerCase();

        if (q.includes("北部")) newFilters.region = "北部";
        else if (q.includes("中部")) newFilters.region = "中部";
        else if (q.includes("南部")) newFilters.region = "南部";
        else if (q.includes("東部")) newFilters.region = "東部";
        
        if (q.includes("ai") || q.includes("智能") || q.includes("人工智慧")) newFilters.isAI = true;
        if (q.includes("新創")) newFilters.isStartup = true;

        if (q.includes("管理") || q.includes("erp") || q.includes("人資")) newFilters.category = "企業管理";
        else if (q.includes("客服") || q.includes("行銷")) newFilters.category = "行銷客服";
        else if (q.includes("esg") || q.includes("減碳")) newFilters.category = "ESG永續";
        else if (q.includes("資安") || q.includes("防毒")) newFilters.category = "技術基礎";

        let numStr = q.replace(/一/g, '1')
                      .replace(/二/g, '2')
                      .replace(/兩/g, '2')
                      .replace(/三/g, '3')
                      .replace(/四/g, '4')
                      .replace(/五/g, '5')
                      .replace(/六/g, '6')
                      .replace(/七/g, '7')
                      .replace(/八/g, '8')
                      .replace(/九/g, '9')
                      .replace(/十/g, '10');

        const priceMatch = numStr.match(/(\d+)\s*萬/);
        if (priceMatch) newFilters.maxPrice = parseInt(priceMatch[1]) * 10000;

        return newFilters;
      };

      // ==========================================
      // 4. 搜尋行為處理
      // ==========================================
      const handleSearchSubmit = async () => {
        if (!query.trim()) return;
        setIsSearching(true);
        setExpandedId(null);

        try {
          const claudeResult = await callClaude(query);
          setFilters({
            region: claudeResult.region || null,
            isAI: claudeResult.ai || null,
            isStartup: claudeResult.startup || null,
            category: claudeResult.category || null,
            maxPrice: claudeResult.maxPrice || claudeResult.maxMonthly || null,
            domain: claudeResult.domainKey || null
          });
        } catch (err) {
          console.error("❌ Claude API 失敗，啟用備用解析器:", err);
          const fallbackFilters = parseQueryFallback(query);
          setFilters(fallbackFilters);
        }

        setIsSearching(false);
        setActivePage("report");
      };

      const handleQuickSearch = (text) => {
        setQuery(text);
        setIsSearching(true);
        setTimeout(() => {
          const fallbackFilters = parseQueryFallback(text);
          setFilters(fallbackFilters);
          setIsSearching(false);
          setActivePage("report");
        }, 500);
      };

      // ==========================================
      // 5. 資料篩選邏輯
      // ==========================================
      const filteredResults = useMemo(() => {
        return allData.filter(item => {
          // 🚀 修正：加上 trim() 進行嚴格的區域比對
          const matchRegion = !filters.region || (item.r && item.r.trim() === filters.region.trim());

          const matchCat = !filters.category || (item.cat && item.cat.includes(filters.category));
          const matchDomain = !filters.domain || (item.d && item.d.includes(filters.domain));
          
          const matchAI = filters.isAI === null ? true : item.ai === filters.isAI;
          const matchStartup = filters.isStartup === null ? true : item.st === filters.isStartup;
          
          const matchPrice = !filters.maxPrice || (item.pr != null && Number(item.pr) <= Number(filters.maxPrice));

          return matchRegion && matchAI && matchStartup && matchCat && matchPrice && matchDomain;
        });
      }, [filters, allData]);

      const toggleFilter = (key, value) => {
        setFilters(prev => ({ ...prev, [key]: prev[key] === value ? null : value }));
      };

      const clearAllFilters = () => {
        setFilters({ region: null, isAI: null, isStartup: null, category: null, maxPrice: null, domain: null });
        setQuery("");
      };

      // ==========================================
      // UI 畫面渲染
      // ==========================================
      if (loading) return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-[#f8fafc]">
          <i className="fa-solid fa-cloud-arrow-down text-6xl text-emerald-500 mb-6 animate-bounce"></i>
          <div className="text-2xl font-bold text-slate-800 mb-2">資料庫連線中...</div>
          <div className="text-slate-400 text-sm flex items-center gap-2">
            <i className="fa-solid fa-circle-notch fa-spin"></i> 正在讀取 1,198 個產業方案
          </div>
        </div>
      );

      if (error) return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-[#f8fafc]">
          <i className="fa-solid fa-triangle-exclamation text-6xl text-red-500 mb-6"></i>
          <div className="text-2xl font-bold text-slate-800 mb-2">載入失敗</div>
          <div className="text-slate-500 bg-red-50 px-4 py-2 rounded-lg border border-red-100">{error}</div>
          <button onClick={() => window.location.reload()} className="mt-6 text-emerald-600 hover:underline font-bold">重新整理頁面</button>
        </div>
      );

      const renderHome = () => (
        <div className="bg-[#0d3d2a] text-white py-32 px-6 border-t-[4px] border-[#0d6e52] flex flex-col items-center text-center animate-in min-h-screen relative overflow-hidden">
          <div className="absolute inset-0 opacity-10 pointer-events-none">
            <div className="absolute top-10 left-10 w-64 h-64 bg-[#1D9E75] rounded-full blur-[120px]"></div>
            <div className="absolute bottom-10 right-10 w-96 h-96 bg-[#0d6e52] rounded-full blur-[150px]"></div>
          </div>
          
          <div className="relative z-10 w-full max-w-2xl">
            <div className="bg-white/10 backdrop-blur-xl p-6 rounded-3xl mb-8 inline-block shadow-2xl border border-white/5">
              <i className="fa-solid fa-brain text-[#1D9E75] text-6xl"></i>
            </div>
            <h1 className="text-5xl md:text-7xl font-black mb-8 leading-tight tracking-tight">
              產業策略智庫<br /><span className="text-[#1D9E75]">即時語意分析。</span>
            </h1>
            <p className="text-slate-300 text-lg mb-12 max-w-xl mx-auto font-medium leading-relaxed">
              輸入您的數位轉型需求或公司現況，Claude AI 將自動為您從 {allData.length} 筆方案中精選最佳導入路徑。
            </p>
            
            <div className="flex flex-col sm:flex-row gap-4 w-full bg-white/5 p-2 rounded-[2.5rem] border border-white/10 backdrop-blur-sm shadow-2xl">
              <input 
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && handleSearchSubmit()}
                placeholder="搜尋：我們預算三萬，想找北部的 AI 智能客服系統..."
                className="flex-1 bg-transparent rounded-full px-6 py-4 outline-none text-white placeholder:text-white/30 text-lg font-medium"
              />
              <button 
                onClick={handleSearchSubmit}
                disabled={isSearching}
                className="bg-[#0d6e52] hover:bg-[#1D9E75] disabled:opacity-50 text-white px-10 py-4 rounded-full font-black text-lg shadow-2xl transition-all active:scale-95 whitespace-nowrap flex items-center justify-center gap-2"
              >
                {isSearching ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-wand-magic-sparkles"></i>}
                {isSearching ? "解析中..." : "AI 搜尋"}
              </button>
            </div>
          </div>
        </div>
      );

      const renderReport = () => (
        <div className="max-w-4xl mx-auto px-4 py-8 animate-in">
          <div className="flex items-center gap-4 mb-8">
             <button onClick={() => setActivePage("home")} className="w-10 h-10 bg-white rounded-full shadow flex items-center justify-center text-slate-500 hover:text-emerald-600 transition-colors">
                <i className="fa-solid fa-arrow-left"></i>
             </button>
             <div>
                <h2 className="text-2xl font-bold text-slate-800">搜尋結果分析</h2>
                <p className="text-sm text-slate-500">已套用 AI 語意解析</p>
             </div>
          </div>

          <div className="bg-white p-2 rounded-2xl shadow-sm border border-slate-200 flex items-center relative z-20 mb-4 focus-within:shadow-md focus-within:border-emerald-300">
            <i className="fa-solid fa-magnifying-glass text-slate-400 ml-4 mr-2"></i>
            <input 
              type="text" 
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && handleSearchSubmit()}
              placeholder="進一步描述您的需求..."
              className="flex-1 py-3 px-2 outline-none text-slate-700 bg-transparent"
            />
            <button 
              onClick={handleSearchSubmit}
              disabled={isSearching}
              className="bg-[#0d6e52] hover:bg-[#1D9E75] disabled:opacity-50 text-white px-6 py-3 rounded-xl font-bold transition-colors flex items-center gap-2"
            >
              {isSearching ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-sparkles"></i>}
              {isSearching ? "解析中..." : "重新搜尋"}
            </button>
          </div>

          <div className="flex flex-wrap gap-2 mb-8 px-1">
            <span className="text-xs text-slate-400 font-bold py-1.5 mr-1">範例查詢：</span>
            {["北部有哪些 AI 客服方案", "中部 5萬以下的資安防護", "南部新創的 ESG 方案", "企業管理的 ERP 系統"].map(text => (
              <button 
                key={text}
                onClick={() => handleQuickSearch(text)}
                className="text-xs text-emerald-600 bg-emerald-50 hover:bg-emerald-100 px-3 py-1.5 rounded-lg font-medium transition-colors border border-emerald-100"
              >
                {text}
              </button>
            ))}
          </div>

          <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm mb-8">
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-sm font-bold text-slate-700 flex items-center gap-2">
                <i className="fa-solid fa-sliders text-slate-400"></i> 解析與手動篩選條件
              </h3>
              {(filters.region || filters.isAI || filters.isStartup || filters.category || filters.maxPrice || filters.domain) && (
                <button onClick={clearAllFilters} className="text-xs text-red-500 hover:text-red-700 font-bold transition-colors">
                  清除全部
                </button>
              )}
            </div>
            
            <div className="space-y-4">
              <div className="flex flex-wrap items-center gap-2">
                <span className="text-xs text-slate-400 w-10">區域</span>
                {REGIONS.map(r => (
                  <button 
                    key={r} onClick={() => toggleFilter('region', r)}
                    className={`px-3 py-1 text-xs rounded-full border transition-all ${filters.region === r ? 'bg-emerald-50 border-emerald-400 text-emerald-700 font-bold shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300'}`}
                  >
                    {r}
                  </button>
                ))}
              </div>
              <div className="flex flex-wrap items-center gap-2">
                <span className="text-xs text-slate-400 w-10">標籤</span>
                <button 
                  onClick={() => toggleFilter('isAI', true)}
                  className={`px-3 py-1 text-xs rounded-full border transition-all ${filters.isAI ? 'bg-emerald-50 border-emerald-400 text-emerald-700 font-bold shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300'}`}
                >
                  <i className="fa-solid fa-robot mr-1"></i> AI 方案
                </button>
                <button 
                  onClick={() => toggleFilter('isStartup', true)}
                  className={`px-3 py-1 text-xs rounded-full border transition-all ${filters.isStartup ? 'bg-emerald-50 border-emerald-400 text-emerald-700 font-bold shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300'}`}
                >
                  <i className="fa-solid fa-seedling mr-1"></i> 新創嚴選
                </button>
                {filters.maxPrice && (
                  <span className="px-3 py-1 text-xs rounded-full border bg-orange-50 border-orange-200 text-orange-700 font-bold flex items-center gap-1">
                    價格 ≤ {filters.maxPrice/10000}萬 <i className="fa-solid fa-xmark cursor-pointer ml-1 hover:text-orange-900" onClick={() => toggleFilter('maxPrice', filters.maxPrice)}></i>
                  </span>
                )}
                {filters.domain && (
                  <span className="px-3 py-1 text-xs rounded-full border bg-purple-50 border-purple-200 text-purple-700 font-bold flex items-center gap-1">
                    關鍵字: {filters.domain} <i className="fa-solid fa-xmark cursor-pointer ml-1 hover:text-purple-900" onClick={() => toggleFilter('domain', filters.domain)}></i>
                  </span>
                )}
              </div>
              <div className="flex flex-wrap items-center gap-2">
                <span className="text-xs text-slate-400 w-10">領域</span>
                {CATEGORIES.map(c => (
                  <button 
                    key={c} onClick={() => toggleFilter('category', c)}
                    className={`px-3 py-1 text-xs rounded-full border transition-all ${filters.category === c ? 'bg-emerald-50 border-emerald-400 text-emerald-700 font-bold shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300'}`}
                  >
                    {c}
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div className="mb-4 flex justify-between items-end px-2">
            <h3 className="text-sm font-bold text-slate-700">搜尋結果</h3>
            <span className="text-xs text-slate-400 bg-slate-200 px-2 py-0.5 rounded-md font-mono">{filteredResults.length} 筆</span>
          </div>

          <div className="space-y-4">
            {filteredResults.length > 0 ? filteredResults.map((item, idx) => (
              <div key={idx} className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden hover:border-[#0d6e52]/40 transition-colors animate-in">
                <div className="p-5 sm:p-6 flex flex-col sm:flex-row justify-between gap-4 cursor-pointer" onClick={() => setExpandedId(expandedId === item.id ? null : item.id)}>
                  <div className="flex-1">
                    <div className="flex flex-wrap gap-2 mb-2">
                      {(item.ai === true || item.ai === "True") && <span className="bg-yellow-100 text-yellow-800 border border-yellow-200 text-[10px] px-2 py-0.5 rounded font-bold"><i className="fa-solid fa-bolt mr-1"></i>AI方案</span>}
                      {(item.st === true || item.st === "True") && <span className="bg-emerald-100 text-emerald-800 border border-emerald-200 text-[10px] px-2 py-0.5 rounded font-bold">新創嚴選</span>}
                      {item.r && <span className="bg-slate-100 text-slate-600 border border-slate-200 text-[10px] px-2 py-0.5 rounded"><i className="fa-solid fa-location-dot mr-1"></i>{item.r}</span>}
                    </div>
                    <h2 className="text-lg font-bold text-slate-900 mb-1">{item.s}</h2>
                    <p className="text-sm text-slate-500 font-medium">{item.c}</p>
                    <div className="flex items-center gap-2 mt-3 text-xs text-slate-400 w-full overflow-x-auto no-scrollbar">
                      {item.cat && item.cat.split(',').map((cat, i) => (
                        <span key={i} className="bg-slate-50 border border-slate-100 px-2 py-1 rounded-md whitespace-nowrap">{cat.trim()}</span>
                      ))}
                    </div>
                  </div>
                  
                  <div className="flex flex-row sm:flex-col justify-between sm:justify-center items-center sm:items-end border-t sm:border-t-0 border-slate-100 pt-4 sm:pt-0 sm:pl-4 sm:border-l sm:min-w-[120px]">
                    <div className="text-left sm:text-right">
                      <p className="text-[10px] text-slate-400 mb-0.5">預估方案費用</p>
                      <p className="text-lg font-bold text-[#0d6e52] font-mono">{formatCurrency(item.pr)}</p>
                      {item.mo && <p className="text-[10px] text-slate-400 mt-1">約 {formatCurrency(item.mo)} / 月</p>}
                    </div>
                    <div className={`mt-0 sm:mt-4 text-slate-300 transition-transform ${expandedId === item.id ? 'rotate-180' : ''}`}>
                      <i className="fa-solid fa-chevron-down"></i>
                    </div>
                  </div>
                </div>

                {expandedId === item.id && (
                  <div className="px-5 sm:px-6 pb-6 pt-2 bg-slate-50 border-t border-slate-100 text-sm animate-in">
                    <div className="mb-4">
                      <h4 className="font-bold text-slate-700 mb-1.5 text-xs"><i className="fa-regular fa-file-lines mr-1 text-slate-400"></i>方案介紹</h4>
                      <p className="text-slate-600 leading-relaxed bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        {item.desc || "此方案暫無詳細介紹，請聯繫廠商獲取更多資訊。"}
                      </p>
                    </div>
                    <div>
                      <h4 className="font-bold text-slate-700 mb-1.5 text-xs"><i className="fa-solid fa-tags mr-1 text-slate-400"></i>適用服務領域</h4>
                      <p className="text-slate-600 leading-relaxed font-medium">{item.d || "未提供分類資訊"}</p>
                    </div>
                  </div>
                )}
              </div>
            )) : (
              <div className="py-16 text-center bg-white rounded-2xl border border-slate-200">
                <i className="fa-solid fa-robot text-4xl text-slate-300 mb-3"></i>
                <p className="text-slate-500 font-bold">找不到符合條件的方案</p>
                <p className="text-slate-400 text-sm mt-1">請嘗試減少過濾條件，或更換關鍵字搜尋</p>
              </div>
            )}
          </div>

          <div className="mt-12 text-center text-xs text-slate-400 font-bold">
            即時連線 Airtable 資料庫 — 共 <span className="text-slate-500">{allData.length}</span> 個方案
          </div>
        </div>
      );

      return (
        <div className="min-h-screen flex flex-col">
          <header className="bg-white/90 backdrop-blur-md border-b border-black/5 sticky top-0 z-[100] transition-all">
            <div className="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
              <div className="flex items-center gap-3 cursor-pointer" onClick={() => { setActivePage("home"); setIsSearching(false); setQuery(""); }}>
                <div className="w-10 h-10 bg-[#0d6e52] rounded-2xl flex items-center justify-center text-white shadow-lg">
                  <i className="fa-solid fa-layer-group text-xl"></i>
                </div>
                <div>
                  <span className="font-black text-lg text-[#0d3d2a] tracking-tight block leading-none mb-1">產業策略 V16.0</span>
                </div>
              </div>
            </div>
          </header>

          <main className="flex-1 overflow-hidden overflow-y-auto custom-scrollbar">
            {activePage === "home" ? renderHome() : renderReport()}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
