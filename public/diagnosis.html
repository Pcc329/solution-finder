<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顧問診斷工具 | Solution Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #f8fafc; color: #111827; }
    #global-nav { position: sticky; top: 0; z-index: 1000; background: #ffffff; border-bottom: 1px solid #e5e7eb; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .global-nav-brand { display: flex; align-items: center; gap: 10px; }
    .global-nav-logo { width: 36px; height: 36px; background: #0d9488; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .global-nav-kicker { font-size: 10px; color: #6b7280; letter-spacing: 0.1em; }
    .global-nav-title { font-size: 14px; font-weight: 600; color: #111827; }
    .global-nav-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .global-nav-link { padding: 6px 14px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; color: #374151; text-decoration: none; background: #fff; font-weight: 600; }
    .global-nav-link.active { background: #0d9488; color: #ffffff; border-color: #0d9488; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 18px; box-shadow: 0 10px 26px rgba(15, 23, 42, 0.06); }
    .field-label { display: block; font-size: 13px; font-weight: 800; color: #334155; margin-bottom: 8px; }
    .control { width: 100%; border: 1px solid #dbe3ea; border-radius: 12px; padding: 11px 12px; background: #fff; font-size: 14px; color: #0f172a; outline: none; }
    .control:focus { border-color: #0d9488; box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.12); }
    .pain-option { display: flex; gap: 9px; align-items: center; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px 11px; font-size: 13px; color: #334155; cursor: pointer; background: #fff; }
    .pain-option:has(input:checked) { border-color: #0d9488; background: #f0fdfa; color: #0f766e; font-weight: 800; }
    .btn-primary { background: #0d9488; color: white; border-radius: 12px; font-weight: 900; padding: 12px 16px; transition: 0.18s; }
    .btn-primary:hover { background: #0f766e; }
    .btn-primary:disabled { background: #cbd5e1; cursor: not-allowed; }
    .badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 3px 8px; font-size: 11px; font-weight: 800; white-space: nowrap; }
    .badge-ai { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
    .badge-muted { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
    .selected-card { border-color: #0d9488 !important; box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.12); }
    .sticky-compare { position: sticky; bottom: 16px; z-index: 30; }
    @media (max-width: 768px) {
      #global-nav { align-items: flex-start; flex-direction: column; gap: 10px; padding: 12px 16px; }
      .global-nav-actions { width: 100%; justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <nav id="global-nav">
    <a class="global-nav-brand" href="/" style="text-decoration:none;">
      <div class="global-nav-logo"><span style="font-size:18px;">◆</span></div>
      <div>
        <div class="global-nav-kicker">SOLUTION FINDER</div>
        <div class="global-nav-title">資服產業資料庫</div>
      </div>
    </a>
    <div class="global-nav-actions">
      <a class="global-nav-link" href="/sources.html">資料來源</a>
      <a class="global-nav-link" href="/dashboard.html">戰情儀表板</a>
      <a class="global-nav-link" href="/strategy-guide.html">策略智庫 ↗</a>
      <a class="global-nav-link active" href="/diagnosis.html">診斷工具 ↗</a>
    </div>
  </nav>

  <main class="w-[calc(100%_-_32px)] max-w-[1180px] mx-auto py-8">
    <header class="mb-6">
      <p class="text-xs tracking-[0.18em] uppercase text-teal-700 font-black mb-2">consultant diagnosis</p>
      <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-3">
        <div>
          <h1 class="text-3xl md:text-4xl font-black text-slate-900">顧問數位診斷工具</h1>
          <p class="text-sm text-slate-500 mt-2">輸入企業條件，快速從方案資料庫產出顧問推薦清單。</p>
        </div>
        <div id="dataStatus" class="text-xs text-slate-400">正在讀取方案資料...</div>
      </div>
    </header>

    <section class="grid grid-cols-1 lg:grid-cols-[360px_1fr] gap-6 items-start">
      <aside class="card p-5">
        <div class="flex items-center justify-between mb-5">
          <h2 class="text-lg font-black text-slate-900">診斷問卷</h2>
          <span class="badge badge-muted">Phase 1</span>
        </div>

        <form id="diagnosisForm" class="space-y-5">
          <div>
            <label class="field-label" for="industry">產業別</label>
            <select id="industry" class="control" required>
              <option value="餐飲">餐飲</option>
              <option value="製造">製造</option>
              <option value="零售">零售</option>
              <option value="醫療">醫療</option>
              <option value="物流">物流</option>
              <option value="建築營造">建築營造</option>
              <option value="金融">金融</option>
              <option value="教育">教育</option>
              <option value="旅遊住宿">旅遊住宿</option>
              <option value="電商">電商</option>
              <option value="其他">其他</option>
            </select>
          </div>

          <div>
            <label class="field-label" for="scale">企業規模</label>
            <select id="scale" class="control" required>
              <option value="10人以下">10人以下</option>
              <option value="10–50人">10–50人</option>
              <option value="50–100人">50–100人</option>
              <option value="100–300人">100–300人</option>
              <option value="300人以上">300人以上</option>
            </select>
          </div>

          <div>
            <label class="field-label" for="budget">預算上限</label>
            <select id="budget" class="control" required>
              <option value="5萬以下">5萬以下</option>
              <option value="5–10萬">5–10萬</option>
              <option value="10–30萬">10–30萬</option>
              <option value="30–50萬">30–50萬</option>
              <option value="50萬以上">50萬以上</option>
              <option value="不限">不限</option>
            </select>
          </div>

          <div>
            <label class="field-label">主要痛點 <span class="text-red-500">*</span></label>
            <div class="grid grid-cols-1 gap-2">
              <label class="pain-option"><input type="checkbox" name="pain" value="解決人力短缺"> 解決人力短缺</label>
              <label class="pain-option"><input type="checkbox" name="pain" value="提升辦公效率"> 提升辦公效率</label>
              <label class="pain-option"><input type="checkbox" name="pain" value="加強資訊安全"> 加強資訊安全</label>
              <label class="pain-option"><input type="checkbox" name="pain" value="簡化現金流管理"> 簡化現金流管理</label>
              <label class="pain-option"><input type="checkbox" name="pain" value="接觸新客戶"> 接觸新客戶</label>
              <label class="pain-option"><input type="checkbox" name="pain" value="改善客戶體驗"> 改善客戶體驗</label>
              <label class="pain-option"><input type="checkbox" name="pain" value="簡化供應鏈"> 簡化供應鏈</label>
              <label class="pain-option"><input type="checkbox" name="pain" value="數位轉型入門"> 數位轉型入門</label>
            </div>
            <p id="formError" class="text-xs text-red-500 mt-2 hidden">請至少選擇一個主要痛點。</p>
          </div>

          <button id="submitBtn" class="btn-primary w-full" type="submit">
            <i class="fa-solid fa-wand-magic-sparkles mr-2"></i>開始診斷
          </button>
        </form>
      </aside>

      <section class="space-y-4">
        <div class="card p-5">
          <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
            <div>
              <h2 class="text-xl font-black text-slate-900">推薦方案 <span id="resultCount" class="text-teal-700">0</span> 筆</h2>
              <p id="queryPreview" class="text-xs text-slate-400 mt-1">完成問卷後產生推薦清單。</p>
            </div>
            <div id="parsedPreview" class="text-xs text-slate-500 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 hidden"></div>
          </div>
        </div>

        <div id="emptyState" class="card p-10 text-center text-slate-500">
          <div class="w-12 h-12 rounded-2xl bg-teal-50 text-teal-700 flex items-center justify-center mx-auto mb-4">
            <i class="fa-solid fa-clipboard-check"></i>
          </div>
          <p class="font-bold text-slate-700">請先完成左側診斷問卷</p>
          <p class="text-sm mt-2">系統會依產業、規模、預算與痛點推薦最多 20 筆方案。</p>
        </div>

        <div id="loadingState" class="card p-8 text-center text-slate-500 hidden">
          <i class="fa-solid fa-circle-notch animate-spin text-teal-700 mr-2"></i>
          正在分析條件並篩選方案...
        </div>

        <div id="noResultState" class="card p-10 text-center text-slate-500 hidden">
          <p class="font-bold text-slate-700">目前資料庫沒有完全符合的方案</p>
          <p class="text-sm mt-2">建議放寬預算或減少痛點條件後再次診斷。</p>
        </div>

        <div id="resultsList" class="space-y-3"></div>

        <div id="compareBar" class="sticky-compare card px-5 py-4 hidden">
          <div class="flex flex-col sm:flex-row sm:items-center justify-center gap-3">
            <p class="text-sm font-black text-slate-800 text-center">已選 <span id="selectedCount">0</span> 個方案</p>
            <button id="clearSelectedBtn" class="px-4 py-2 rounded-xl border border-slate-200 text-slate-600 text-sm font-bold hover:bg-slate-50">清除</button>
            <button id="compareBtn" class="btn-primary px-5 py-2" disabled>查看比較</button>
          </div>
          <p id="compareNotice" class="text-xs text-red-500 text-center mt-2 hidden">最多只能選擇 3 筆方案。</p>
        </div>
      </section>
    </section>
  </main>

  <script>
    const budgetMap = {
      "5萬以下": 50000,
      "5–10萬": 100000,
      "10–30萬": 300000,
      "30–50萬": 500000,
      "50萬以上": null,
      "不限": null,
    };

    const budgetPhraseMap = {
      "5萬以下": "預算5萬以內",
      "5–10萬": "預算10萬以內",
      "10–30萬": "預算30萬以內",
      "30–50萬": "預算50萬以內",
      "50萬以上": "預算50萬以上",
      "不限": "不限預算",
    };

    const industryKeywordMap = {
      "餐飲": "住宿及餐飲業",
      "製造": "製造業",
      "零售": "批發零售業",
      "醫療": "醫療",
      "物流": "運輸及倉儲",
      "建築營造": "營建工程",
      "金融": "金融保險",
      "教育": "教育業",
      "旅遊住宿": "旅宿業",
      "電商": "批發零售業",
    };

    const painRules = {
      "解決人力短缺": { keyword: "人資", category: "人力資源", terms: ["人資", "人力", "招募", "排班", "薪資", "人才"] },
      "提升辦公效率": { keyword: "辦公", category: "協作辦公", terms: ["辦公", "協作", "文件", "專案", "流程", "自動化"] },
      "加強資訊安全": { keyword: "資安", category: "資安合規", terms: ["資安", "資訊安全", "網路安全", "防護", "合規"] },
      "簡化現金流管理": { keyword: "財務", category: "銷售管理", terms: ["財務", "金流", "現金流", "收款", "發票", "帳務"] },
      "接觸新客戶": { keyword: "行銷", category: "行銷推廣", terms: ["行銷", "廣告", "客戶", "名單", "開發", "銷售"] },
      "改善客戶體驗": { keyword: "客服", category: "銷售管理", terms: ["客服", "顧客", "客戶體驗", "CRM", "會員", "服務"] },
      "簡化供應鏈": { keyword: "供應鏈", category: "生產物流", terms: ["供應鏈", "進銷存", "倉儲", "物流", "庫存"] },
      "數位轉型入門": { keyword: "數位", category: null, terms: ["數位", "雲端", "SaaS", "入門", "轉型"] },
    };

    const scaleTerms = {
      "10人以下": ["微型企業", "小微", "10人以下", "新創"],
      "10–50人": ["中小企業", "小型", "10-50", "10–50"],
      "50–100人": ["中小企業", "中型", "50-100", "50–100"],
      "100–300人": ["中大型企業", "中型", "100-300", "100–300"],
      "300人以上": ["大型企業", "中大型企業", "300人以上"],
    };

    const refs = {
      form: document.getElementById("diagnosisForm"),
      industry: document.getElementById("industry"),
      scale: document.getElementById("scale"),
      budget: document.getElementById("budget"),
      formError: document.getElementById("formError"),
      submitBtn: document.getElementById("submitBtn"),
      dataStatus: document.getElementById("dataStatus"),
      emptyState: document.getElementById("emptyState"),
      loadingState: document.getElementById("loadingState"),
      noResultState: document.getElementById("noResultState"),
      resultsList: document.getElementById("resultsList"),
      resultCount: document.getElementById("resultCount"),
      queryPreview: document.getElementById("queryPreview"),
      parsedPreview: document.getElementById("parsedPreview"),
      compareBar: document.getElementById("compareBar"),
      selectedCount: document.getElementById("selectedCount"),
      compareBtn: document.getElementById("compareBtn"),
      clearSelectedBtn: document.getElementById("clearSelectedBtn"),
      compareNotice: document.getElementById("compareNotice"),
    };

    let allSolutions = [];
    let currentResults = [];
    let selectedItems = [];

    const safeStr = value => {
      if (value === null || value === undefined) return "";
      if (Array.isArray(value)) return value.join(" ");
      return String(value);
    };

    const escapeHtml = value => safeStr(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");

    const formatCurrency = value => {
      if (value === null || value === undefined || value === "") return "未提供";
      const n = Number(value);
      if (!Number.isFinite(n)) return "未提供";
      return `NT$ ${n.toLocaleString("zh-TW")}`;
    };

    const getPrice = item => {
      if (item.pr === null || item.pr === undefined || item.pr === "") return null;
      const price = Number(item.pr);
      return Number.isFinite(price) ? price : null;
    };

    function getSelectedPains() {
      return [...document.querySelectorAll('input[name="pain"]:checked')].map(input => input.value);
    }

    function buildQuery(formData) {
      const painText = formData.pains.join("和");
      return `${formData.industry}業，${formData.scale}，${budgetPhraseMap[formData.budget]}，想要${painText}`;
    }

    function localParse(formData) {
      const rules = formData.pains.map(pain => painRules[pain]).filter(Boolean);
      return {
        keyword: rules.map(rule => rule.keyword).filter(Boolean).join(" "),
        category: rules.find(rule => rule.category)?.category || null,
        industryKeyword: industryKeywordMap[formData.industry] || null,
        maxPrice: budgetMap[formData.budget],
        scale: formData.scale,
      };
    }

    async function parseWithClaude(query, fallback) {
      try {
        const res = await fetch("/api/claude", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query }),
        });
        if (!res.ok) return fallback;
        const data = await res.json();
        return { ...fallback, ...data, maxPrice: fallback.maxPrice, scale: fallback.scale };
      } catch (err) {
        return fallback;
      }
    }

    function containsAny(item, terms) {
      const haystack = [
        item.s, item.c, item.cat, item.d, item.iv, item.desc, item.feat, item.tags, item.scale, item.slogan
      ].map(safeStr).join(" ").toLowerCase();
      return terms.some(term => haystack.includes(term.toLowerCase()));
    }

    function scoreSolution(item, parsed, formData) {
      let score = 0;
      const price = getPrice(item);
      const hasPrice = price !== null;
      const textFields = [item.s, item.c, item.cat, item.d, item.iv, item.desc, item.feat, item.tags, item.scale, item.slogan]
        .map(safeStr).join(" ").toLowerCase();

      if (parsed.category && safeStr(item.cat).includes(parsed.category)) score += 90;
      if (parsed.industry_vertical && safeStr(item.iv).includes(parsed.industry_vertical)) score += 70;
      if (parsed.industryKeyword && safeStr(item.d).includes(parsed.industryKeyword)) score += 70;

      const keywordTerms = safeStr(parsed.keyword).split(/\s+|,|，/).filter(Boolean);
      keywordTerms.forEach(term => {
        if (textFields.includes(term.toLowerCase())) score += 35;
      });

      formData.pains.forEach(pain => {
        const rule = painRules[pain];
        if (!rule) return;
        if (rule.category && safeStr(item.cat).includes(rule.category)) score += 55;
        if (containsAny(item, rule.terms)) score += 32;
      });

      const scaleHits = scaleTerms[formData.scale] || [];
      if (scaleHits.length && containsAny(item, scaleHits)) score += 28;

      if (hasPrice) {
        score += 12;
        if (parsed.maxPrice) {
          score += Math.max(0, 20 - Math.floor((price / parsed.maxPrice) * 10));
        }
      } else {
        score -= 30;
      }

      if (item.ai) score += 5;
      return score;
    }

    function filterSolutions(parsed, formData) {
      const maxPrice = parsed.maxPrice;
      const candidates = allSolutions.filter(item => {
        const price = getPrice(item);
        if (maxPrice && (price === null || price > maxPrice)) return false;
        if (parsed.ai !== undefined && item.ai !== parsed.ai) return false;
        if (parsed.startup !== undefined && item.st !== parsed.startup) return false;
        return true;
      });

      return candidates
        .map((item, index) => ({ item, index, score: scoreSolution(item, parsed, formData) }))
        .filter(entry => entry.score > 0 || candidates.length < 20)
        .sort((a, b) => {
          if (b.score !== a.score) return b.score - a.score;
          const ap = getPrice(a.item) ?? Infinity;
          const bp = getPrice(b.item) ?? Infinity;
          if (ap !== bp) return ap - bp;
          return a.index - b.index;
        })
        .slice(0, 20)
        .map(entry => entry.item);
    }

    function toComparePayload(item) {
      return {
        id: item.id,
        s: item.s,
        c: item.c,
        pr: item.pr,
        pt: item.pt,
        ai: item.ai,
        cat: item.cat,
        r: item.r,
        city: item.city,
        feat: item.feat,
        tags: item.tags,
        p: item.p,
        desc: item.desc,
        mo: item.mo,
        so: item.so,
      };
    }

    function setLoading(loading) {
      refs.submitBtn.disabled = loading || allSolutions.length === 0;
      refs.submitBtn.innerHTML = loading
        ? '<i class="fa-solid fa-circle-notch animate-spin mr-2"></i>診斷中...'
        : '<i class="fa-solid fa-wand-magic-sparkles mr-2"></i>開始診斷';
      refs.loadingState.classList.toggle("hidden", !loading);
    }

    function updateCompareBar() {
      refs.selectedCount.textContent = selectedItems.length;
      refs.compareBtn.disabled = selectedItems.length < 2;
      refs.compareBar.classList.toggle("hidden", selectedItems.length === 0);
    }

    function toggleSelected(itemId) {
      const item = currentResults.find(result => result.id === itemId);
      if (!item) return;
      const exists = selectedItems.some(selected => selected.id === itemId);
      refs.compareNotice.classList.add("hidden");
      if (exists) {
        selectedItems = selectedItems.filter(selected => selected.id !== itemId);
      } else if (selectedItems.length >= 3) {
        refs.compareNotice.classList.remove("hidden");
        const box = document.querySelector(`[data-select-id="${CSS.escape(itemId)}"]`);
        if (box) box.checked = false;
      } else {
        selectedItems.push(toComparePayload(item));
      }
      renderResults(currentResults);
      updateCompareBar();
    }

    function renderResults(results) {
      refs.emptyState.classList.add("hidden");
      refs.noResultState.classList.toggle("hidden", results.length !== 0);
      refs.resultCount.textContent = results.length;
      refs.resultsList.innerHTML = results.map(item => {
        const selected = selectedItems.some(entry => entry.id === item.id);
        return `
          <article class="card p-5 border ${selected ? "selected-card" : ""}">
            <div class="flex items-start gap-4">
              <input type="checkbox" class="mt-1 h-4 w-4 accent-teal-700" data-select-id="${escapeHtml(item.id)}" ${selected ? "checked" : ""}>
              <div class="min-w-0 flex-1">
                <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3">
                  <div class="min-w-0">
                    <h3 class="text-base font-black text-slate-900 truncate">${escapeHtml(item.s || "未命名方案")}</h3>
                    <p class="text-sm text-slate-500 mt-1">${escapeHtml(item.c || "未提供業者")}</p>
                  </div>
                  <div class="text-left sm:text-right shrink-0">
                    <p class="text-sm font-black text-teal-700 font-mono">${formatCurrency(item.pr)}</p>
                    ${item.pt ? `<p class="text-[11px] text-slate-400 mt-1">${escapeHtml(item.pt)}</p>` : ""}
                  </div>
                </div>
                <div class="mt-3 flex flex-wrap gap-2">
                  <span class="badge badge-muted">${escapeHtml(item.cat || "未分類")}</span>
                  <span class="badge ${item.ai ? "badge-ai" : "badge-muted"}">${item.ai ? "有 AI" : "非 AI"}</span>
                  ${item.r ? `<span class="badge badge-muted">${escapeHtml(item.r)}</span>` : ""}
                  ${item.scale ? `<span class="badge badge-muted">${escapeHtml(item.scale)}</span>` : ""}
                </div>
              </div>
            </div>
          </article>
        `;
      }).join("");

      refs.resultsList.querySelectorAll("input[data-select-id]").forEach(box => {
        box.addEventListener("change", () => toggleSelected(box.dataset.selectId));
      });
    }

    async function handleSubmit(event) {
      event.preventDefault();
      const pains = getSelectedPains();
      if (pains.length === 0) {
        refs.formError.classList.remove("hidden");
        return;
      }
      refs.formError.classList.add("hidden");
      refs.noResultState.classList.add("hidden");
      refs.resultsList.innerHTML = "";
      selectedItems = [];
      updateCompareBar();

      const formData = {
        industry: refs.industry.value,
        scale: refs.scale.value,
        budget: refs.budget.value,
        pains,
      };
      const query = buildQuery(formData);
      refs.queryPreview.textContent = query;
      setLoading(true);

      const fallback = localParse(formData);
      const parsed = await parseWithClaude(query, fallback);
      currentResults = filterSolutions(parsed, formData);
      refs.parsedPreview.classList.remove("hidden");
      refs.parsedPreview.textContent = `解析：${[parsed.category, parsed.keyword, parsed.industryKeyword].filter(Boolean).join(" / ") || "基本條件"}`;
      setLoading(false);
      renderResults(currentResults);
    }

    async function loadSolutions() {
      refs.submitBtn.disabled = true;
      try {
        const res = await fetch("/api/solutions");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        allSolutions = await res.json();
        refs.dataStatus.textContent = `已載入 ${allSolutions.length.toLocaleString("zh-TW")} 筆方案`;
        refs.submitBtn.disabled = false;
      } catch (err) {
        refs.dataStatus.textContent = "方案資料載入失敗，請稍後重試";
        refs.dataStatus.className = "text-xs text-red-500";
      }
    }

    refs.form.addEventListener("submit", handleSubmit);
    refs.clearSelectedBtn.addEventListener("click", () => {
      selectedItems = [];
      renderResults(currentResults);
      updateCompareBar();
    });
    refs.compareBtn.addEventListener("click", () => {
      if (selectedItems.length < 2) return;
      sessionStorage.setItem("compareItems", JSON.stringify(selectedItems));
      window.location.href = "/compare.html";
    });

    loadSolutions();
  </script>
</body>
</html>
