<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台灣資服業者方案資料庫</title>
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      document.body.innerHTML = '<div style="padding: 2rem; color: #dc2626; font-family: sans-serif; text-align: center;"><h2>發生錯誤</h2><p>' + message + '</p></div>';
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background-color: #ffffff; color: #111827; }
    #global-nav { position: sticky; top: 0; z-index: 1000; background: #ffffff; border-bottom: 1px solid #e5e7eb; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .global-nav-brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .global-nav-logo { width: 36px; height: 36px; background: #0d9488; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .global-nav-kicker { font-size: 10px; color: #6b7280; letter-spacing: 0.1em; }
    .global-nav-title { font-size: 14px; font-weight: 600; color: #111827; }
    .global-nav-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .global-nav-link { padding: 6px 14px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; color: #374151; text-decoration: none; background: #fff; font-weight: 600; }
    .global-nav-link.active { background: #0d9488; color: #ffffff; border-color: #0d9488; }
    @media (max-width: 640px) {
      #global-nav { align-items: flex-start; flex-direction: column; gap: 10px; padding: 12px 16px; }
      .global-nav-actions { width: 100%; justify-content: flex-start; }
    }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .animate-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .roi-entry { display: none !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    const { useState, useMemo, useEffect, useCallback, useRef } = React;
    const { createPortal } = ReactDOM;

    const PAGE_SIZE = 20;

    const formatCurrency = (num) => {
      if (num === null || num === undefined || num === "") return "未提供";
      return "NT$ " + Number(num).toLocaleString();
    };

    // 欄位對照 (solutions.js 回傳的 key)
    // id, s=方案名, c=公司名, cid, p=program_type, ai, d=target_industry,
    // cat=industry_category, iv=industry_vertical, pr=price, pt=price_tier,
    // mo=monthly_price, mt=monthly_price_tier, r=region, st=is_startup,
    // city, desc=description, feat=features_list, tags=tech_tags, scale, slogan

    const REGIONS = ["北部", "中部", "南部", "東部", "其他"];
    const CATEGORIES = ["銷售管理", "行銷推廣", "生產物流", "協作辦公", "人力資源", "資安合規", "研發創新", "醫療照護", "暫無法分類"];
    const INDUSTRY_VERTICALS = ["旅宿觀光", "製造業", "醫療照護", "建築營造", "文化創意"];
    const PROGRAMS = ["臺灣雲市集", "雲市集工業館", "SME AI平台", "新創嚴選網", "商業服務業專區", "政府軟體採購網", "領域型調查(人工搜查)"];

    const SORT_OPTIONS = [
      { value: "relevance", label: "相關性" },
      { value: "price_asc", label: "價格低→高" },
      { value: "price_desc", label: "價格高→低" },
      { value: "company_az", label: "公司名 A-Z" },
      { value: "name_az", label: "方案名 A-Z" },
    ];

    function ROIModal({ item, onClose }) {
      const [people, setPeople] = useState(10);
      const [salary, setSalary] = useState(40000);

      const monthlyFee = Number(item.mo || 0) || 0;
      const monthlyLabor = people * salary;
      const requiredEff = monthlyLabor > 0
        ? ((monthlyFee / monthlyLabor) * 100).toFixed(1)
        : "0.0";
      const requiredEffValue = Number(requiredEff);
      const difficulty =
        requiredEffValue < 3 ? { label: "非常容易達到", cls: "green" } :
        requiredEffValue < 8 ? { label: "可達成", cls: "amber" } :
        { label: "挑戰性較高", cls: "red" };

      const toneClass = difficulty.cls === "green"
        ? "bg-green-50 border border-green-200"
        : difficulty.cls === "amber"
          ? "bg-amber-50 border border-amber-200"
          : "bg-red-50 border border-red-200";
      const valueClass = difficulty.cls === "green"
        ? "text-green-700"
        : difficulty.cls === "amber"
          ? "text-amber-700"
          : "text-red-700";
      const labelClass = difficulty.cls === "green"
        ? "text-green-600"
        : difficulty.cls === "amber"
          ? "text-amber-600"
          : "text-red-600";

      return (
        <div className="fixed inset-0 z-[9999] flex items-end sm:items-center justify-center p-4"
          style={{ background: "rgba(0,0,0,0.5)" }}
          onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6"
            onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-start mb-5">
              <div>
                <h3 className="font-black text-slate-800 text-lg">ROI 試算</h3>
                <p className="text-xs text-slate-500 mt-1">{item.name}</p>
              </div>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-xl">✕</button>
            </div>

            <div className="bg-emerald-50 rounded-xl p-3 mb-5 flex justify-between items-center">
              <span className="text-sm text-emerald-700 font-bold">方案月費</span>
              <span className="text-lg font-black text-emerald-800 font-mono">
                {monthlyFee > 0 ? `NT$ ${monthlyFee.toLocaleString()}` : "未提供"}
              </span>
            </div>

            <div className="space-y-4 mb-5">
              <div>
                <label className="text-xs text-slate-500 mb-1 block">影響人數（人）</label>
                <input type="number" min="1" value={people}
                  onChange={e => setPeople(Number(e.target.value) || 1)}
                  className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-emerald-400" />
              </div>
              <div>
                <label className="text-xs text-slate-500 mb-1 block">平均人月成本（元）</label>
                <input type="number" min="1000" step="1000" value={salary}
                  onChange={e => setSalary(Number(e.target.value) || 1000)}
                  className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-emerald-400" />
              </div>
            </div>

            {monthlyFee > 0 ? (
              <div className={`rounded-xl p-4 text-center ${toneClass}`}>
                <p className="text-xs text-slate-500 mb-1">只需提升</p>
                <p className={`text-4xl font-black mb-1 ${valueClass}`}>{requiredEff}%</p>
                <p className="text-sm font-bold text-slate-600">效率，即可回收月費</p>
                <p className={`text-xs mt-2 font-bold ${labelClass}`}>{difficulty.label}</p>
              </div>
            ) : (
              <div className="bg-slate-50 rounded-xl p-4 text-center text-sm text-slate-400">
                此方案未提供月費資訊<br />
                <span className="text-xs">請聯繫業者詢問報價</span>
              </div>
            )}

            <p className="text-[10px] text-slate-300 text-center mt-4">
              試算僅供顧問初步評估，正式報告仍需以實際導入範圍校正。
            </p>
          </div>
        </div>
      );
    }

    function App() {
      const [allData, setAllData] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [activePage, setActivePage] = useState("home"); // home | list | detail
      const [selectedItem, setSelectedItem] = useState(null);
      const [query, setQuery] = useState("");
      const [isSearching, setIsSearching] = useState(false);
      const [filters, setFilters] = useState({
        region: [], isAI: null, isStartup: null,
        category: [], maxPrice: null, keyword: null,
        program: [], industry_vertical: [],
        industryKeyword: null
      });
      const [sortBy, setSortBy] = useState("relevance");
      const [currentPage, setCurrentPage] = useState(1);
      const [compareItems, setCompareItems] = useState([]);
      const [compareNotice, setCompareNotice] = useState("");
      const [askQuestion, setAskQuestion] = useState("");
      const [askAnswer, setAskAnswer] = useState("");
      const [askLoading, setAskLoading] = useState(false);
      const [askError, setAskError] = useState("");
      const [roiModal, setROIModal] = useState(null);
      const [showFilterTip, setShowFilterTip] = useState(false);
      const listTopRef = useRef(null);

      // 1. 抓資料
      useEffect(() => {
        async function fetchAll() {
          try {
            const res = await fetch("/api/solutions");
            if (!res.ok) throw new Error("API error: " + res.status);
            const data = await res.json();
            setAllData(data);
            setLoading(false);
          } catch (err) {
            setError(err.message);
            setLoading(false);
          }
        }
        fetchAll();
      }, []);

      // 2. Claude 語意解析
      async function callClaude(userQuery) {
        const res = await fetch("/api/claude", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: userQuery })
        });
        if (!res.ok) throw new Error("Claude API 失敗");
        return await res.json();
      }

      // 3. Fallback 關鍵字比對
      const parseQueryFallback = (text) => {
        let f = { region: [], isAI: null, isStartup: null, category: [], maxPrice: null, keyword: null, program: [], industry_vertical: [], industryKeyword: null };
        const q = text.toLowerCase();
        if (q.includes("北部") || q.includes("台北") || q.includes("新北")) f.region = ["北部"];
        else if (q.includes("中部") || q.includes("台中")) f.region = ["中部"];
        else if (q.includes("南部") || q.includes("高雄") || q.includes("台南")) f.region = ["南部"];
        else if (q.includes("東部") || q.includes("花蓮") || q.includes("台東")) f.region = ["東部"];
        if (/\bai\b/i.test(text) || q.includes("人工智慧") || q.includes("智能") || q.includes("智慧")) f.isAI = true;
        if (q.includes("新創")) f.isStartup = true;
        if (q.includes("旅宿") || q.includes("觀光")) f.industry_vertical = ["旅宿觀光"];
        else if (q.includes("製造")) f.industry_vertical = ["製造業"];
        else if (q.includes("醫療") || q.includes("照護")) f.industry_vertical = ["醫療照護"];
        else if (q.includes("建築") || q.includes("營造")) f.industry_vertical = ["建築營造"];
        else if (q.includes("文創") || q.includes("文化")) f.industry_vertical = ["文化創意"];
        if (q.includes("餐飲")) f.industryKeyword = "住宿及餐飲業";
        else if (q.includes("製造")) f.industryKeyword = "製造業";
        else if (q.includes("零售") || q.includes("電商")) f.industryKeyword = "批發零售業";
        else if (q.includes("醫療")) f.industryKeyword = "醫療";
        else if (q.includes("物流")) f.industryKeyword = "運輸及倉儲";
        else if (q.includes("建築") || q.includes("營造")) f.industryKeyword = "營建工程";
        else if (q.includes("金融") || q.includes("銀行") || q.includes("保險")) f.industryKeyword = "金融保險";
        else if (q.includes("教育")) f.industryKeyword = "教育業";
        else if (q.includes("旅遊") || q.includes("旅宿") || q.includes("住宿")) f.industryKeyword = "旅宿業";
        CATEGORIES.forEach(cat => { if (q.includes(cat)) f.category = [cat]; });
        PROGRAMS.forEach(prog => { if (q.includes(prog)) f.program = [prog]; });
        const priceMatch = q.match(/(\d+)\s*萬/);
        if (priceMatch) f.maxPrice = parseInt(priceMatch[1]) * 10000;
        const priceMatch2 = q.match(/(\d+)\s*千/);
        if (priceMatch2 && !priceMatch) f.maxPrice = parseInt(priceMatch2[1]) * 1000;
        f.keyword = text.trim();
        return f;
      };

      // 4. 搜尋處理（統一走 Claude，失敗才 fallback）
      const handleSearch = async () => {
        if (loading || !query.trim()) return;
        setIsSearching(true);
        try {
          const result = await callClaude(query);
          setFilters({
            region: result.region ? [result.region] : [],
            isAI: result.ai != null ? result.ai : null,
            isStartup: result.startup != null ? result.startup : null,
            category: result.category ? [result.category] : [],
            maxPrice: result.maxPrice || null,
            keyword: result.keyword || null,
            program: result.program ? [result.program] : [],
            industry_vertical: result.industry_vertical ? [result.industry_vertical] : [],
            industryKeyword: result.industryKeyword || null,
          });
        } catch (err) {
          setFilters(parseQueryFallback(query));
        }
        setIsSearching(false);
        setActivePage("list");
        setSelectedItem(null);
        setCurrentPage(1);
        setSortBy("relevance");
      };

      // 快速搜尋也走 Claude
      const handleQuickSearch = async (text) => {
        if (loading) return;
        setQuery(text);
        setIsSearching(true);
        setActivePage("list");
        setSelectedItem(null);
        setCurrentPage(1);
        setSortBy("relevance");
        try {
          const result = await callClaude(text);
          setFilters({
            region: result.region ? [result.region] : [],
            isAI: result.ai != null ? result.ai : null,
            isStartup: result.startup != null ? result.startup : null,
            category: result.category ? [result.category] : [],
            maxPrice: result.maxPrice || null,
            keyword: result.keyword || null,
            program: result.program ? [result.program] : [],
            industry_vertical: result.industry_vertical ? [result.industry_vertical] : [],
            industryKeyword: result.industryKeyword || null,
          });
        } catch (err) {
          setFilters(parseQueryFallback(text));
        }
        setIsSearching(false);
      };

      // helper: 安全轉小寫字串（防止陣列或非字串欄位）
      const safeStr = (v) => (typeof v === 'string' ? v : Array.isArray(v) ? v.join(',') : String(v || ''));

      const INDUSTRY_KEYWORDS = {
        "金融": ["法遵", "合規", "金融", "個資法", "金管會", "洗錢", "KYC", "銀行", "保險"],
        "製造": ["工控", "OT", "工廠", "製造", "產線", "SCADA", "PLC", "機台"],
        "餐飲": ["POS", "餐飲", "門市", "收銀", "點餐", "外送", "訂位"],
        "醫療": ["醫療", "病歷", "診所", "醫院", "長照", "健保"],
        "零售電商": ["電商", "零售", "網購", "購物車", "會員", "門市", "上架"],
        "物流": ["物流", "倉儲", "配送", "車隊", "運輸"],
        "教育": ["教育", "教學", "學校", "課程", "補習", "學習"],
        "旅遊": ["旅遊", "住宿", "訂房", "旅宿", "觀光", "飯店"],
      };

      const INDUSTRY_ALIASES = [
        ["金融", ["金融", "銀行", "保險", "證券", "金控"]],
        ["製造", ["製造", "工廠", "工業", "產線", "智慧製造"]],
        ["餐飲", ["餐飲", "餐廳", "飲料", "咖啡", "外送"]],
        ["醫療", ["醫療", "診所", "醫院", "照護", "長照"]],
        ["零售電商", ["零售", "電商", "網購", "門市", "商店"]],
        ["物流", ["物流", "倉儲", "配送", "運輸", "車隊"]],
        ["教育", ["教育", "學校", "教學", "補習", "課程"]],
        ["旅遊", ["旅遊", "旅宿", "住宿", "觀光", "飯店"]],
      ];

      const INDUSTRY_VERTICAL_TO_SOFT_KEY = {
        "旅宿觀光": "旅遊",
        "製造業": "製造",
        "醫療照護": "醫療",
      };

      const detectIndustryKey = useCallback((text, currentFilters) => {
        const selectedVertical = Array.isArray(currentFilters.industry_vertical)
          ? currentFilters.industry_vertical.find(iv => INDUSTRY_VERTICAL_TO_SOFT_KEY[iv])
          : currentFilters.industry_vertical;
        if (selectedVertical && INDUSTRY_VERTICAL_TO_SOFT_KEY[selectedVertical]) {
          return INDUSTRY_VERTICAL_TO_SOFT_KEY[selectedVertical];
        }
        const source = safeStr(text).toLowerCase();
        if (!source) return null;
        for (const [industry, aliases] of INDUSTRY_ALIASES) {
          if (aliases.some(alias => source.includes(alias.toLowerCase()))) return industry;
        }
        return null;
      }, []);

      const getIndustryScore = useCallback((item, industryKey) => {
        const terms = INDUSTRY_KEYWORDS[industryKey];
        if (!terms) return 0;
        const haystack = [
          item.desc,
          item.feat,
          item.d,
          item.iv,
          item.cat,
          item.tags,
          item.slogan,
        ].map(safeStr).join(" ").toLowerCase();
        return terms.reduce((score, term) => {
          return score + (haystack.includes(term.toLowerCase()) ? 12 : 0);
        }, 0);
      }, []);

      // 5. 計算相關性分數（keyword 命中位置加權）
      const getRelevanceScore = useCallback((item, kw) => {
        if (!kw) return 0;
        const k = kw.toLowerCase();
        let score = 0;
        if (safeStr(item.s).toLowerCase().includes(k)) score += 100;
        if (safeStr(item.c).toLowerCase().includes(k)) score += 80;
        if (safeStr(item.cat).toLowerCase().includes(k)) score += 70;
        if (safeStr(item.slogan).toLowerCase().includes(k)) score += 40;
        if (safeStr(item.desc).toLowerCase().includes(k)) score += 30;
        if (safeStr(item.feat).toLowerCase().includes(k)) score += 20;
        if (safeStr(item.tags).toLowerCase().includes(k)) score += 10;
        return score;
      }, []);

      // 6. 篩選邏輯（keyword 比對加入 feat, slogan）
      const filteredResults = useMemo(() => {
        const industryKey = detectIndustryKey(query || filters.keyword || filters.industry_vertical, filters);
        let results = allData.filter(item => {
          if (filters.region.length > 0 && !filters.region.includes(item.r)) return false;
          if (filters.isAI !== null && item.ai !== filters.isAI) return false;
          if (filters.isStartup !== null && item.st !== filters.isStartup) return false;
          if (filters.category.length > 0 && !(item.cat && filters.category.some(c => item.cat.includes(c)))) return false;
          if (filters.program.length > 0 && !filters.program.includes(item.p)) return false;
          if (filters.industry_vertical.length > 0 && !filters.industry_vertical.includes(item.iv)) return false;
          if (filters.maxPrice && (item.pr === null || Number(item.pr) > Number(filters.maxPrice))) return false;
          if (filters.keyword) {
            const kw = filters.keyword.toLowerCase();
            const matched = safeStr(item.s).toLowerCase().includes(kw)
              || safeStr(item.c).toLowerCase().includes(kw)
              || safeStr(item.desc).toLowerCase().includes(kw)
              || safeStr(item.feat).toLowerCase().includes(kw)
              || safeStr(item.slogan).toLowerCase().includes(kw)
              || safeStr(item.cat).toLowerCase().includes(kw)
              || safeStr(item.tags).toLowerCase().includes(kw);
            if (!matched) return false;
          }
          return true;
        });
        // 排序
        if (sortBy === "relevance" && (filters.keyword || filters.industryKeyword)) {
          results = results
            .map((item, index) => {
              const relevanceScore = filters.keyword ? getRelevanceScore(item, filters.keyword) : 0;
              const industryScore = industryKey ? getIndustryScore(item, industryKey) : 0;
              const industryKeywordScore = filters.industryKeyword
                ? (safeStr(item.d).includes(filters.industryKeyword) ? 50 : 0)
                : 0;
              return { item, index, relevanceScore, industryScore, industryKeywordScore };
            })
            .sort((a, b) => {
              const scoreA = a.relevanceScore + a.industryScore + a.industryKeywordScore;
              const scoreB = b.relevanceScore + b.industryScore + b.industryKeywordScore;
              if (scoreB !== scoreA) return scoreB - scoreA;
              return a.index - b.index;
            })
            .map(entry => entry.item);
        } else if (sortBy === "price_asc") {
          results.sort((a, b) => (a.pr ?? Infinity) - (b.pr ?? Infinity));
        } else if (sortBy === "price_desc") {
          results.sort((a, b) => (b.pr ?? -1) - (a.pr ?? -1));
        } else if (sortBy === "company_az") {
          results.sort((a, b) => (a.c || "").localeCompare(b.c || "", "zh-Hant"));
        } else if (sortBy === "name_az") {
          results.sort((a, b) => (a.s || "").localeCompare(b.s || "", "zh-Hant"));
        }

        return results;
      }, [filters, allData, sortBy, getRelevanceScore, getIndustryScore, detectIndustryKey, query]);

      // 7. 分頁
      const totalPages = Math.max(1, Math.ceil(filteredResults.length / PAGE_SIZE));
      const pagedResults = useMemo(() => {
        const start = (currentPage - 1) * PAGE_SIZE;
        return filteredResults.slice(start, start + PAGE_SIZE);
      }, [filteredResults, currentPage]);

                />
                <button onClick={handleAsk} disabled={askLoading || !askQuestion.trim()}
                  className="bg-[#0d6e52] hover:bg-[#1D9E75] disabled:bg-slate-300 disabled:cursor-not-allowed text-white px-6 py-3 rounded-xl text-sm font-black transition-colors flex items-center justify-center gap-2">
                  {askLoading && <i className="fa-solid fa-circle-notch fa-spin"></i>}
                  {askLoading ? "分析中..." : "送出"}
                </button>
              </div>
              {askError && <p className="text-xs text-red-500 mt-3">{askError}</p>}
              {askAnswer && (
                <div className="mt-4 bg-white rounded-2xl border border-emerald-100 shadow-md p-5">
                  <div className="flex items-center justify-between gap-3 mb-3">
                    <span className="bg-emerald-50 text-emerald-700 border border-emerald-100 text-xs px-3 py-1 rounded-full font-black">AI 分析</span>
                  </div>
                  <div className="text-sm text-slate-700 leading-relaxed prose prose-sm max-w-none"
                    dangerouslySetInnerHTML={{ __html: marked.parse(askAnswer) }} />
                  <p className="text-xs text-slate-400 text-right mt-4">根據 {Math.min(filteredResults.length, 50)} 筆方案分析</p>
                </div>
              )}
            </div>
          )}

          {/* Result count + sort */}
          <div className="mb-4 flex justify-between items-center px-1">
            <h3 className="text-sm font-bold text-slate-700 flex items-center gap-2 flex-wrap">
              搜尋結果
              <span className="text-xs text-slate-400 bg-slate-200 px-2 py-0.5 rounded-md font-mono">{filteredResults.length} 筆</span>
              {filterSummary && (
                <span className="text-xs text-slate-400 font-normal">{filterSummary}</span>
              )}
            </h3>
            <div className="flex items-center gap-2">
              <span className="text-xs text-slate-400"><i className="fa-solid fa-arrow-down-wide-short mr-1"></i>排序</span>
              <select value={sortBy} onChange={(e) => setSortBy(e.target.value)}
                className="text-xs border border-slate-200 rounded-lg px-2 py-1.5 bg-white text-slate-600 outline-none focus:border-emerald-400 cursor-pointer">
                {SORT_OPTIONS.map(opt => (
                  <option key={opt.value} value={opt.value}>{opt.label}</option>
                ))}
              </select>
            </div>
          </div>

          {/* Results list (paginated) */}
          <div className="space-y-3">
            {loading ? null : pagedResults.length > 0 ? pagedResults.map((item) => {
              const checked = isCompareSelected(item);
              const disabled = !checked && compareItems.length >= 4;
              return (
              <div key={item.id || item.s}
                onClick={() => { setSelectedItem(item); setActivePage("detail"); }}
                className={`bg-white rounded-2xl border shadow-sm overflow-hidden hover:border-[#0d6e52]/40 hover:shadow-md transition-all cursor-pointer animate-in ${checked ? "border-[#1D9E75] ring-2 ring-[#1D9E75]/20" : "border-slate-200"}`}>
                <div className="p-5 sm:p-6 flex flex-col sm:flex-row justify-between gap-4">
                  <label onClick={(e) => e.stopPropagation()}
                    className={`flex items-center justify-center w-9 h-9 rounded-xl border shrink-0 cursor-pointer transition-colors ${checked ? "bg-emerald-50 border-[#1D9E75] text-[#0d6e52]" : "bg-white border-slate-200 text-slate-400 hover:border-emerald-300"} ${disabled ? "opacity-40 cursor-not-allowed" : ""}`}
                    title="加入比較">
                    <input type="checkbox" checked={checked}
                      onChange={(e) => toggleCompareItem(item, e.target.checked)}
                      className="sr-only" />
                    <i className={`fa-solid ${checked ? "fa-check" : "fa-plus"} text-sm`}></i>
                  </label>
                  <div className="flex-1 min-w-0">
                    <div className="flex flex-wrap gap-2 mb-2">
                      {item.ai && <span className="bg-yellow-100 text-yellow-800 border border-yellow-200 text-[10px] px-2 py-0.5 rounded font-bold"><i className="fa-solid fa-bolt mr-1"></i>AI方案</span>}
                      {item.st && <span className="bg-emerald-100 text-emerald-800 border border-emerald-200 text-[10px] px-2 py-0.5 rounded font-bold">新創嚴選</span>}
                      {item.iv && <span className="bg-purple-100 text-purple-800 border border-purple-200 text-[10px] px-2 py-0.5 rounded font-bold">{item.iv}</span>}
                      {item.r && <span className="bg-slate-100 text-slate-600 border border-slate-200 text-[10px] px-2 py-0.5 rounded"><i className="fa-solid fa-location-dot mr-1"></i>{item.r}</span>}
                      {item.scale && <span className="bg-sky-50 text-sky-700 border border-sky-200 text-[10px] px-2 py-0.5 rounded">{item.scale}</span>}
                    </div>
                    <div className="flex items-start justify-between gap-3 mb-1">
                      <h2 className="text-lg font-bold text-slate-900 truncate">{item.s || "（未命名方案）"}</h2>
                      <div className="shrink-0">{renderStars(item.so)}</div>
                    </div>
                    <p className="text-sm text-slate-500 font-medium truncate">{item.c}</p>
                    {item.cat && (
                      <div className="flex items-center gap-2 mt-2 overflow-x-auto no-scrollbar">
                        {item.cat.split(",").map((c, i) => (
                          <span key={i} className="bg-slate-50 border border-slate-100 px-2 py-0.5 rounded text-[10px] text-slate-500 whitespace-nowrap">{c.trim()}</span>
                        ))}
                      </div>
                    )}
                  </div>
                  <div className="flex flex-row sm:flex-col justify-between sm:justify-center items-center sm:items-end border-t sm:border-t-0 border-slate-100 pt-3 sm:pt-0 sm:pl-4 sm:border-l sm:min-w-[110px]">
                    <div className="text-left sm:text-right">
                      <p className="text-[10px] text-slate-400 mb-0.5">方案費用</p>
                      <p className="text-base font-bold text-[#0d6e52] font-mono">{formatCurrency(item.pr)}</p>
                      {item.mo && <p className="text-[10px] text-slate-400 mt-0.5">{formatCurrency(item.mo)}/月</p>}
                      <button
                        onClick={(e) => { e.stopPropagation(); openROIModal(item); }}
                        className="roi-entry mt-2 text-xs text-emerald-600 hover:text-emerald-800 font-bold flex items-center gap-1 transition-colors sm:ml-auto">
                        <i className="fa-solid fa-calculator"></i> 試算 ROI
                      </button>
                    </div>
                    <i className="fa-solid fa-chevron-right text-slate-300 mt-0 sm:mt-4"></i>
                  </div>
                </div>
              </div>
            )}) : (
              <div className="py-16 text-center bg-white rounded-2xl border border-slate-200">
                <i className="fa-solid fa-robot text-4xl text-slate-300 mb-3"></i>
                <p className="text-slate-500 font-bold">找不到符合條件的方案</p>
                <p className="text-slate-400 text-sm mt-1">請嘗試減少過濾條件，或更換關鍵字</p>
              </div>
            )}
          </div>

          {/* Pagination */}
          {renderPagination()}

          {compareItems.length > 0 && createPortal(
            <div className="fixed bottom-0 left-0 right-0 z-[1100] bg-white/95 backdrop-blur border-t border-emerald-100 shadow-2xl px-6 pt-4 pb-6 flex flex-col sm:flex-row sm:items-center justify-center gap-4">
              <div className="text-center sm:text-left">
                <p className="text-sm font-black text-slate-800">已選 {compareItems.length} 個方案</p>
                {compareNotice && <p className="text-xs text-red-500 mt-1">{compareNotice}</p>}
              </div>
              <div className="flex flex-wrap justify-center gap-2">
                <button onClick={clearCompareItems}
                  className="px-4 py-2 rounded-xl border border-slate-200 text-slate-600 text-sm font-bold hover:bg-slate-50 transition-colors">
                  清除
                </button>
                <button onClick={startCompare} disabled={compareItems.length < 2}
                  className="px-5 py-2 rounded-xl bg-[#0d6e52] disabled:bg-slate-300 disabled:cursor-not-allowed text-white text-sm font-black shadow-sm hover:bg-[#1D9E75] transition-colors">
                  比較
                </button>
                <button onClick={startRoiEstimate}
                  className="roi-entry px-5 py-2 rounded-xl bg-[#0d6e52] text-white text-sm font-black shadow-sm hover:bg-[#1D9E75] transition-colors">
                  試算 ROI ↗
                </button>
              </div>
            </div>,
            document.body
          )}

          <div className="mt-10 text-center text-xs text-slate-400 font-bold">
            共 <span className="text-slate-500">{allData.length.toLocaleString()}</span> 個方案
          </div>
        </div>
      );

      // ===== DETAIL PAGE =====
      const renderDetail = () => {
        const item = selectedItem;
        if (!item) return null;

        // 將 features_list 拆成陣列顯示
        const featureLines = item.feat
          ? item.feat.split(/\n|；|;/).map(l => l.trim()).filter(Boolean)
          : [];

        return (
          <div className="max-w-3xl mx-auto px-4 py-8 animate-in">
            {/* Back button */}
            <button onClick={() => { setActivePage("list"); setSelectedItem(null); }}
              className="flex items-center gap-2 text-sm text-slate-500 hover:text-emerald-600 mb-6 transition-colors">
              <i className="fa-solid fa-arrow-left"></i> 返回搜尋結果
            </button>

            {/* Header card */}
            <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 mb-4">
              <div className="flex flex-wrap gap-2 mb-4">
                {item.ai && <span className="bg-yellow-100 text-yellow-800 border border-yellow-200 text-xs px-3 py-1 rounded-full font-bold"><i className="fa-solid fa-bolt mr-1"></i>AI方案</span>}
                {item.st && <span className="bg-emerald-100 text-emerald-800 border border-emerald-200 text-xs px-3 py-1 rounded-full font-bold"><i className="fa-solid fa-seedling mr-1"></i>新創嚴選</span>}
                {item.iv && <span className="bg-purple-100 text-purple-800 border border-purple-200 text-xs px-3 py-1 rounded-full font-bold">{item.iv}</span>}
                {item.p && <span className="bg-blue-100 text-blue-800 border border-blue-200 text-xs px-3 py-1 rounded-full">{item.p}</span>}
                {item.r && <span className="bg-slate-100 text-slate-600 border border-slate-200 text-xs px-3 py-1 rounded-full"><i className="fa-solid fa-location-dot mr-1"></i>{item.r}{item.city ? ` · ${item.city}` : ""}</span>}
                {item.scale && <span className="bg-sky-50 text-sky-700 border border-sky-200 text-xs px-3 py-1 rounded-full">{item.scale}</span>}
              </div>
              <h1 className="text-2xl font-black text-slate-900 mb-2">{item.s || "（未命名方案）"}</h1>
              <p className="text-base text-slate-600 font-semibold mb-4">{item.c}</p>
              {item.slogan && <p className="text-sm text-emerald-700 bg-emerald-50 px-4 py-2 rounded-xl border border-emerald-100 italic">「{item.slogan}」</p>}
            </div>

            {/* Price card */}
            <div className="grid grid-cols-2 gap-4 mb-4">
              <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
                <p className="text-xs text-slate-400 mb-1">方案總費用</p>
                <p className="text-2xl font-black text-[#0d6e52] font-mono">{formatCurrency(item.pr)}</p>
                {item.pt && <p className="text-xs text-slate-400 mt-1">{item.pt}</p>}
              </div>
              <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
                <p className="text-xs text-slate-400 mb-1">月費</p>
                <p className="text-2xl font-black text-slate-700 font-mono">{item.mo ? formatCurrency(item.mo) : "—"}</p>
                {item.mt && <p className="text-xs text-slate-400 mt-1">{item.mt}/月</p>}
              </div>
            </div>
            <button
              onClick={() => openROIModal(selectedItem)}
              className="roi-entry mb-6 w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl border-2 border-emerald-500 text-emerald-700 font-bold text-sm hover:bg-emerald-50 transition-colors">
              <i className="fa-solid fa-calculator"></i>
              試算這個方案的 ROI
            </button>

            {/* Description */}
            {item.desc && (
              <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 mb-4">
                <h3 className="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
                  <i className="fa-regular fa-file-lines text-slate-400"></i> 方案介紹
                </h3>
                <p className="text-slate-600 leading-relaxed text-sm whitespace-pre-line">{item.desc}</p>
              </div>
            )}

            {/* Features list — structured display */}
            {featureLines.length > 0 && (
              <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 mb-4">
                <h3 className="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
                  <i className="fa-solid fa-list-check text-slate-400"></i> 功能清單
                  <span className="text-[10px] text-slate-400 font-normal bg-slate-100 px-2 py-0.5 rounded-md">{featureLines.length} 項</span>
                </h3>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-4 gap-y-2">
                  {featureLines.map((line, i) => (
                    <div key={i} className="flex items-start gap-2 text-sm text-slate-600 py-1">
                      <i className="fa-solid fa-check text-emerald-500 text-[10px] mt-1.5 shrink-0"></i>
                      <span>{line}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Tags & Info */}
            <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 mb-4">
              <h3 className="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
                <i className="fa-solid fa-tags text-slate-400"></i> 方案屬性
              </h3>
              <div className="grid grid-cols-2 gap-y-3 text-sm">
                {item.cat && (
                  <div>
                    <p className="text-xs text-slate-400 mb-1">服務類別</p>
                    <p className="text-slate-700 font-medium">{item.cat}</p>
                  </div>
                )}
                {item.d && (
                  <div>
                    <p className="text-xs text-slate-400 mb-1">適用產業</p>
                    <p className="text-slate-700 font-medium">{item.d}</p>
                  </div>
                )}
                {item.scale && (
                  <div>
                    <p className="text-xs text-slate-400 mb-1">適用規模</p>
                    <p className="text-slate-700 font-medium">{item.scale}</p>
                  </div>
                )}
                {item.tags && (
                  <div>
                    <p className="text-xs text-slate-400 mb-1">技術標籤</p>
                    <p className="text-slate-700 font-medium">{item.tags}</p>
                  </div>
                )}
              </div>
            </div>

            {/* Solution ID */}
            <p className="text-xs text-slate-300 text-center">{item.id}</p>
          </div>
        );
      };

      return (
        <div className="min-h-screen flex flex-col">
          <nav id="global-nav">
            <div className="global-nav-brand" onClick={() => { setActivePage("home"); setQuery(""); }}>
              <div className="global-nav-logo"><span style={{fontSize: "18px"}}>🔷</span></div>
              <div>
                <div className="global-nav-kicker">SOLUTION FINDER</div>
                <div className="global-nav-title">資服產業資料庫</div>
              </div>
            </div>
            <div className="global-nav-actions">
              <a className="global-nav-link active" href="/sources.html">資料來源</a>
              <a className="global-nav-link" href="/dashboard.html">戰情儀表板</a>
              <a className="global-nav-link" href="/strategy-guide.html">策略智庫 ↗</a>
              <a className="global-nav-link" href="/manufacturing.html">製造業方案探索 ↗</a>
              <a className="global-nav-link" href="/diagnosis.html">智能方案探索 ↗</a>
            </div>
          </nav>
          <main className="flex-1 overflow-hidden overflow-y-auto custom-scrollbar">
            {activePage === "home" && renderHome()}
            {activePage === "list" && renderList()}
            {activePage === "detail" && renderDetail()}
          </main>
          {roiModal && createPortal(
            <ROIModal item={roiModal} onClose={closeROIModal} />,
            document.body
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
