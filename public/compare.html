<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>方案比較</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    :root {
      --primary: #1D9E75;
      --primary-dark: #0d6e52;
      --bg: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --card: #ffffff;
      --danger: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    }
    #global-nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .global-nav-brand { display: flex; align-items: center; gap: 10px; }
    .global-nav-logo { width: 36px; height: 36px; background: #0d9488; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .global-nav-kicker { font-size: 10px; color: #6b7280; letter-spacing: 0.1em; }
    .global-nav-title { font-size: 14px; font-weight: 600; color: #111827; }
    .global-nav-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .global-nav-link { padding: 6px 14px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; color: #374151; text-decoration: none; background: #fff; font-weight: 600; }
    .global-nav-link.active { background: #0d9488; color: #ffffff; border-color: #0d9488; }

    main {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: center;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    a {
      color: var(--primary-dark);
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .nav-buttons {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-home {
      color: var(--muted);
    }

    .empty {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(31, 41, 55, 0.08);
      padding: 40px;
      text-align: center;
    }

    .table-wrap {
      overflow-x: auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(31, 41, 55, 0.08);
    }

    table {
      width: 100%;
      min-width: 860px;
      border-collapse: collapse;
    }

    th,
    td {
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      padding: 16px;
      vertical-align: top;
      text-align: left;
      line-height: 1.55;
    }

    th:last-child,
    td:last-child {
      border-right: 0;
    }

    tr:last-child th,
    tr:last-child td {
      border-bottom: 0;
    }

    th {
      background: #f1f5f9;
      font-size: 14px;
      color: #334155;
      width: 150px;
    }

    td {
      min-width: 210px;
      font-size: 14px;
      color: #334155;
    }

    .field-name {
      position: sticky;
      left: 0;
      z-index: 2;
      background: #f1f5f9;
      font-weight: 800;
    }

    .different {
      text-decoration: underline;
      text-decoration-color: var(--primary);
      text-decoration-thickness: 3px;
      text-underline-offset: 5px;
    }

    .name {
      font-weight: 800;
      color: #0f172a;
      font-size: 15px;
    }

    .price-low {
      color: var(--primary-dark);
      font-weight: 900;
    }

    .price-high {
      color: var(--danger);
      font-weight: 900;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 800;
    }

    .badge-ai {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .badge-muted {
      background: #f1f5f9;
      color: #64748b;
      border: 1px solid #e2e8f0;
    }

    .features {
      margin: 0;
      padding-left: 18px;
    }

    .features li + li {
      margin-top: 6px;
    }

    .ai-summary-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .ai-summary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      border-radius: 8px;
      background: var(--primary-dark);
      color: #ffffff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 900;
      padding: 12px 18px;
      transition: background 0.2s ease, opacity 0.2s ease;
    }

    .ai-summary-btn:hover {
      background: var(--primary);
    }

    .ai-summary-btn:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.45);
      border-top-color: #ffffff;
      border-radius: 999px;
      animation: spin 0.8s linear infinite;
    }

    .ai-summary-error {
      color: var(--danger);
      font-size: 13px;
      font-weight: 700;
    }

    .ai-summary-card {
      display: none;
      margin-top: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 5px solid var(--primary);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(31, 41, 55, 0.08);
      padding: 20px;
    }

    .ai-summary-card h2 {
      margin: 0 0 12px;
      color: #0f172a;
      font-size: 18px;
    }

    .ai-summary-answer {
      margin: 0;
      color: #334155;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-line;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 720px) {
      #global-nav { align-items: flex-start; flex-direction: column; gap: 10px; padding: 12px 16px; }
      .global-nav-actions { width: 100%; justify-content: flex-start; }
      main {
        width: min(100% - 24px, 1180px);
        padding-top: 24px;
      }

      header {
        display: block;
      }

      header a {
        display: inline-block;
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <nav id="global-nav">
    <div class="global-nav-brand">
      <div class="global-nav-logo"><span style="font-size:18px;">🔷</span></div>
      <div>
        <div class="global-nav-kicker">SOLUTION FINDER</div>
        <div class="global-nav-title">資服產業資料庫</div>
      </div>
    </div>
    <div class="global-nav-actions">
      <a class="global-nav-link" href="/">資料來源</a>
      <a class="global-nav-link" href="/dashboard.html">戰情儀表板</a>
      <a class="global-nav-link" href="/strategy-guide.html">策略智庫 ↗</a>
    </div>
  </nav>
  <main>
    <header>
      <h1>方案比較</h1>
      <div class="nav-buttons">
        <a href="#" onclick="history.back(); return false;">← 返回搜尋結果</a>
        <a href="/" class="nav-home">回首頁</a>
      </div>
    </header>
    <section id="content"></section>
  </main>

  <script>
    const content = document.getElementById('content');

    function formatCurrency(value) {
      if (value === null || value === undefined || value === '') return '未提供';
      const n = Number(value);
      if (!Number.isFinite(n)) return '未提供';
      return `NT$ ${n.toLocaleString('zh-TW')}`;
    }

    function normalize(value) {
      if (value === null || value === undefined || value === '') return '未提供';
      if (Array.isArray(value)) return value.join(', ');
      return String(value);
    }

    function escapeHtml(value) {
      return normalize(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function splitFeatures(value) {
      return normalize(value)
        .split(/\n|；|;/)
        .map(item => item.trim())
        .filter(Boolean)
        .slice(0, 3);
    }

    function rowHasDifference(items, getter) {
      const values = items.map(item => normalize(getter(item)).trim());
      return new Set(values).size > 1;
    }

    function priceClass(item, prices) {
      const price = Number(item.pr);
      if (!Number.isFinite(price) || !prices.length) return '';
      const min = Math.min(...prices);
      const max = Math.max(...prices);
      if (min === max) return '';
      if (price === min) return 'price-low';
      if (price === max) return 'price-high';
      return '';
    }

    function renderCell(field, item, prices) {
      if (field.key === 's') return `<span class="name">${escapeHtml(item.s)}</span>`;
      if (field.key === 'pr') return `<span class="${priceClass(item, prices)}">${formatCurrency(item.pr)}</span>`;
      if (field.key === 'ai') {
        return item.ai
          ? '<span class="badge badge-ai">有 AI</span>'
          : '<span class="badge badge-muted">無 AI</span>';
      }
      if (field.key === 'feat') {
        const features = splitFeatures(item.feat);
        if (!features.length) return '未提供';
        return `<ul class="features">${features.map(feature => `<li>${escapeHtml(feature)}</li>`).join('')}</ul>`;
      }
      return escapeHtml(item[field.key]);
    }

    function renderEmpty() {
      content.innerHTML = `
        <div class="empty">
          <h2>請先從搜尋結果選擇方案</h2>
          <p><a href="/">← 返回搜尋</a></p>
        </div>
      `;
    }

    async function handleAiSummary(items) {
      const button = document.getElementById('aiSummaryBtn');
      const error = document.getElementById('aiSummaryError');
      const card = document.getElementById('aiSummaryCard');
      const answer = document.getElementById('aiSummaryAnswer');
      if (!button || !error || !card || !answer) return;

      button.disabled = true;
      button.innerHTML = '<span class="spinner"></span>AI 分析中...';
      error.textContent = '';
      card.style.display = 'none';
      answer.innerHTML = '';

      try {
        const response = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            question: '請比較這些方案的優缺點與各自適合的使用場景，條列說明每個方案的特色、費用、適用對象。',
            solutions: items,
          }),
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'AI 分析失敗');
        }
        answer.innerHTML = marked.parse(data.answer || '');
        card.style.display = 'block';
      } catch (err) {
        error.textContent = err.message || 'AI 分析失敗';
      } finally {
        button.disabled = false;
        button.textContent = '讓 AI 比較這些方案';
      }
    }

    function renderCompare(items) {
      const fields = [
        { key: 's', label: '方案名稱' },
        { key: 'c', label: '業者名稱' },
        { key: 'pr', label: '費用' },
        { key: 'pt', label: '費用級距' },
        { key: 'ai', label: '是否 AI' },
        { key: 'cat', label: '類別' },
        { key: 'r', label: '服務地區' },
        { key: 'city', label: '城市' },
        { key: 'p', label: '方案來源' },
        { key: 'tags', label: '技術標籤' },
        { key: 'feat', label: '功能摘要' },
      ];
      const prices = items.map(item => Number(item.pr)).filter(Number.isFinite);
      const rows = fields.map(field => {
        const different = field.key !== 'pr' && field.key !== 'ai' && rowHasDifference(items, item => item[field.key]);
        return `
          <tr>
            <th class="field-name ${different ? 'different' : ''}">${field.label}</th>
            ${items.map(item => `<td>${renderCell(field, item, prices)}</td>`).join('')}
          </tr>
        `;
      }).join('');

      content.innerHTML = `
        <div class="table-wrap">
          <table>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div class="ai-summary-actions">
          <button id="aiSummaryBtn" class="ai-summary-btn" type="button">讓 AI 比較這些方案</button>
          <span id="aiSummaryError" class="ai-summary-error"></span>
        </div>
        <div id="aiSummaryCard" class="ai-summary-card">
          <h2>AI 比較分析</h2>
          <div id="aiSummaryAnswer" class="ai-summary-answer"></div>
        </div>
      `;

      const button = document.getElementById('aiSummaryBtn');
      if (button) {
        button.addEventListener('click', () => handleAiSummary(items));
      }
    }

    try {
      const raw = sessionStorage.getItem('compareItems');
      const items = raw ? JSON.parse(raw) : [];
      if (!Array.isArray(items) || items.length === 0) {
        renderEmpty();
      } else {
        renderCompare(items.slice(0, 4));
      }
    } catch (err) {
      renderEmpty();
    }
  </script>
</body>
</html>
